models:
  detection:
    enabled: true
    name: yolov8n.pt
    confidence_threshold: 0.25
  instance_segmentation:
    enabled: true
    name: yolov8n-seg.pt
    confidence_threshold: 0.25
  scene_segmentation:
    enabled: false
    name: nvidia/segformer-b0-finetuned-cityscapes-1024-1024
  depth:
    enabled: false
    name: depth-anything/Depth-Anything-V2-Metric-VKITTI-Small
    depth_type: metric
    unit: meter
  device: auto

fusion:
  iou_threshold: 0.5
  require_same_class: true

input:
  source: datasets/raw/sample.mp4

output:
  perception_json: outputs/perception/perception.json
  mask_dir: outputs/perception/masks
  visualization_dir: outputs/perception/visualizations
  scene:
    class_map_dir: outputs/perception/scene/class_maps
    color_map_dir: outputs/perception/scene/color_maps
    region_dir: outputs/perception/scene/regions
  depth:
    raw_depth_dir: outputs/perception/depth/raw
    depth_png_dir: outputs/perception/depth/depth_maps
    color_map_dir: outputs/perception/depth/color_maps
    visualization_dir: outputs/perception/depth/visualizations

runtime:
  max_frames: null
  save_masks: true
  save_visualizations: true
  save_scene_class_maps: true
  save_scene_color_maps: true
  save_scene_regions: true
  save_raw_depth: true
  save_depth_png: true
  save_depth_color_maps: true
  save_depth_visualizations: true
  continue_on_error: true

depth:
  min_depth_m: null
  max_depth_m: null
  png_scale: 1000.0

depth_visualization:
  alpha: 0.45
  percentile_min: 2.0
  percentile_max: 98.0

geometry:
  enabled: false
  camera_config: configs/camera.yaml
  point_cloud_dir: outputs/perception/geometry/point_clouds
  stride: 4
  min_depth_m: 0.1
  max_depth_m: 80.0

bev:
  enabled: false
  config: configs/bev.yaml
  output:
    class_grid_dir: outputs/perception/bev/class_grids
    drivable_grid_dir: outputs/perception/bev/drivable
    non_drivable_grid_dir: outputs/perception/bev/non_drivable
    visualization_dir: outputs/perception/bev/visualizations

mapping:
  enabled: false
  config: configs/mapping.yaml
  output:
    occupancy_dir: outputs/perception/mapping/occupancy
    cost_grid_dir: outputs/perception/mapping/cost_grids
    inflated_cost_dir: outputs/perception/mapping/inflated_cost_grids
    visualization_dir: outputs/perception/mapping/visualizations
